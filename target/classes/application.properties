# Enable Embedded Dashboard
custom.scheduler.ui.enabled=true

# MySQL Database Setup
spring.datasource.url=jdbc:mysql://localhost:3306/microservice?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=credable

# Hibernate settings (optional, for visibility)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- CUSTOM SCHEDULER GROUP DEFINITIONS ---

# Group 1-3 (For Scheduler 1)
custom.scheduler.groups.G1.timezone=Asia/Kolkata
custom.scheduler.groups.G2.timezone=Europe/Berlin
custom.scheduler.groups.G3.timezone=Asia/Tokyo

# Group 4-6 (For Scheduler 2, in addition to G1-G3)
custom.scheduler.groups.G4.timezone=America/New_York
custom.scheduler.groups.G5.timezone=America/Los_Angeles
custom.scheduler.groups.G6.timezone=America/Sao_Paulo

# --- SCENARIO: DIFFERENT CRONS, SAME TIMEZONE ---
custom.scheduler.groups.INDIA_MORNING.timezone=Asia/Kolkata
custom.scheduler.groups.INDIA_MORNING.cron=0 0 9 * * ?

custom.scheduler.groups.INDIA_NIGHT.timezone=Asia/Kolkata
custom.scheduler.groups.INDIA_NIGHT.cron=0 0 21 * * ?

# --- SCENARIO: SAME CRON, DIFFERENT TIMEZONES ---
custom.scheduler.groups.US_SHIFT.timezone=America/New_York
custom.scheduler.groups.UK_SHIFT.timezone=Europe/London
